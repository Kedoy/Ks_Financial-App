name: Deploy Swagger Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-swagger.yml'
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  pages: write      # to deploy to Pages
  id-token: write   # to verify the deployment originates from an appropriate source
  contents: read    # to read the repository contents

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt

      - name: Generate OpenAPI Schema
        run: |
          cd backend
          python manage.py spectacular --file openapi-schema.yml

      - name: Create Swagger UI
        run: |
          mkdir -p swagger-ui
          
          # Download Swagger UI
          curl -L https://github.com/swagger-api/swagger-ui/archive/refs/tags/v5.10.0.tar.gz -o swagger-ui.tar.gz
          tar -xzf swagger-ui.tar.gz --strip-components=1 -C swagger-ui
          
          # Copy OpenAPI schema
          cp backend/openapi-schema.yml swagger-ui/
          
          # Create index.html with custom config
          cat > swagger-ui/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Ks Financial App - API Documentation</title>
            <link rel="stylesheet" type="text/css" href="swagger-ui.css" />
            <style>
              html { box-sizing: border-box; overflow-y: scroll; }
              *, *:before, *:after { box-sizing: inherit; }
              body { margin: 0; background: #fafafa; }
              .topbar { display: none; }
            </style>
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="swagger-ui-bundle.js" crossorigin></script>
            <script src="swagger-ui-standalone-preset.js" crossorigin></script>
            <script>
              window.onload = () => {
                window.ui = SwaggerUIBundle({
                  url: 'openapi-schema.yml',
                  dom_id: '#swagger-ui',
                  deepLinking: true,
                  presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                  ],
                  plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                  ],
                  layout: "StandaloneLayout",
                  validatorUrl: null,
                });
              };
            </script>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./swagger-ui

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
