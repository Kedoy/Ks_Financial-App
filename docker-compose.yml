version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ks_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fin_db}
      POSTGRES_USER: ${POSTGRES_USER:-fin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fin_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fin_user} -d ${POSTGRES_DB:-fin_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ks_network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ks_backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-fin_db}
      POSTGRES_USER: ${POSTGRES_USER:-fin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fin_password}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:80}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 config.wsgi:application"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    networks:
      - ks_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./my-finance-app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: ks_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - ks_network
    restart: unless-stopped

volumes:
  postgres_data:
  backend_static:
  backend_media:

networks:
  ks_network:
    driver: bridge
