# MkDocs configuration for Ks_Financial-App

site_name: Ks Financial App Documentation
site_description: Документация проекта системы учёта и анализа персональных финансов
site_author: Ks Financial Team
site_url: https://avekedoy.github.io/Ks_Financial-App/

# Repository
repo_name: avekedoy/Ks_Financial-App
repo_url: https://github.com/avekedoy/Ks_Financial-App
edit_uri: blob/main/docs/

# Theme configuration
theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.code.select
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    logo: fontawesome/solid/coins

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/avekedoy/Ks_Financial-App
    - icon: fontawesome/brands/python
      link: https://www.python.org/
  version:
    provider: mike

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Plugins
plugins:
  - search:
      lang: ru
  - mkdocstrings:
      handlers:
        python:
          paths: [backend/apps]
          options:
            show_source: false
            show_root_heading: true
            show_category_heading: true
            merge_init_into_class: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true

# Navigation structure
nav:
  - Главная:
    - Обзор: index.md
    - Быстрый старт: quickstart.md
    - Архитектура: architecture.md
  - Бэкенд:
    - Обзор: backend/index.md
    - Модель данных: backend/models.md
    - API Reference: backend/api.md
    - AI Сервисы: backend/ai-services.md
  - Фронтенд:
    - Обзор: frontend/index.md
    - Компоненты: frontend/components.md
    - Стили: frontend/styling.md
  - Безопасность:
    - Аутентификация: security/auth.md
    - JWT Токены: security/jwt.md
    - Защита данных: security/data-protection.md
  - Развёртывание:
    - Docker: deployment/docker.md
    - Production: deployment/production.md
  - AI Документация:
    - Логика рекомендаций: ai/insights-logic.md
    - OpenRouter API: ai/openrouter.md
    - Классификация: ai/categorization.md
  - Тестирование:
    - Тесты: testing/index.md
    - Покрытие: testing/coverage.md

